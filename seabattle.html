<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Battle 2 - Notebook Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blue-pen: #1e3a8a;
            --red-pen: #dc2626;
            --green-pen: #16a34a;
            --paper-bg: #f8fafc;
            --grid-line: rgba(30, 58, 138, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--paper-bg);
            /* Дэвтрийн дөрвөлжин шугам */
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Caveat', cursive;
            color: var(--blue-pen);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* Дэвтрийн улаан шугам */
        body::before {
            content: "";
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(220, 38, 38, 0.5);
            z-index: -1;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            font-size: 32px;
            font-weight: bold;
            color: var(--blue-pen);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        .arsenal-badge {
            border: 2px solid var(--blue-pen);
            padding: 5px 20px;
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px; /* Зурсан мэт хүрээ */
            background: white;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .game-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            max-width: 900px;
            width: 100%;
        }

        .player-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--blue-pen);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .board-wrapper {
            position: relative;
            background: rgba(255,255,255,0.7);
            padding: 5px;
            border: 3px solid var(--blue-pen);
            border-radius: 5px 2px 4px 6px / 2px 5px 3px 4px; /* Бага зэрэг муруй зураас */
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
        }

        /* Цаад талын бүдэг зураг (Tiger & Octopus шиг) */
        .board-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }

        .board {
            display: grid;
            grid-template-columns: 20px repeat(10, 30px);
            grid-template-rows: 20px repeat(10, 30px);
            gap: 1px;
            position: relative;
            z-index: 1;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .playable {
            border: 1px solid var(--blue-pen);
            cursor: pointer;
            background: transparent;
            transition: background 0.2s;
        }

        .playable:hover { background: rgba(30, 58, 138, 0.1); }

        .label { color: var(--blue-pen); font-size: 18px; }

        /* Зурсан мэт хөлөг онгоц (Player board дээр харагдана) */
        .ship {
            background-color: transparent;
            border: 2px solid var(--blue-pen);
            border-radius: 40% 40% 10% 10%;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(30,58,138,0.3) 3px, rgba(30,58,138,0.3) 4px);
            width: 80%;
            height: 80%;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.2);
        }

        /* Буудлагын төлөвүүд */
        .miss::after {
            content: "•";
            font-size: 30px;
            color: var(--blue-pen);
        }

        .hit::after {
            content: "❌";
            font-size: 18px;
            filter: grayscale(100%) sepia(100%) hue-rotate(300deg) saturate(300%); /* Улаан балаар зурсан мэт */
        }

        /* Компьютерын хөлөг нууцлагдсан байна */
        #enemy-board .ship { display: none; }
        #enemy-board .hit .ship { display: block; border-color: var(--red-pen); background-image: none; background-color: rgba(220,38,38,0.3); }

        .status {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
            text-align: center;
            min-height: 40px;
        }

        button {
            font-family: 'Caveat', cursive;
            background: white;
            color: var(--blue-pen);
            border: 2px solid var(--blue-pen);
            padding: 5px 30px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 3px 25px 5px 20px / 25px 3px 20px 5px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        @media (max-width: 700px) {
            .game-area { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="arsenal-badge">Arsenal</div>
    </div>

    <div class="status" id="status-text">Your Turn: Fire at Enemy Board!</div>

    <div class="game-area">
        <div class="player-section">
            <div class="player-title">🐯 Player Fleet</div>
            <div class="board-wrapper">
                <div class="board-watermark">🐯</div>
                <div class="board" id="player-board"></div>
            </div>
        </div>

        <div class="player-section">
            <div class="player-title">🐙 Enemy Fleet</div>
            <div class="board-wrapper">
                <div class="board-watermark" style="color: red;">🐙</div>
                <div class="board" id="enemy-board"></div>
            </div>
        </div>
    </div>

    <br>
    <button onclick="initGame()">Deploy New Ships</button>

    <script>
        const SIZE = 10;
        const LETTERS = ['A','B','C','D','E','F','G','H','I','J'];
        const SHIPS = [4, 3, 3, 2, 2, 2, 1, 1, 1, 1]; // Усан онгоцуудын урт

        let playerGrid = [];
        let enemyGrid = [];
        let playerTurn = true;
        let gameOver = false;

        function createBoard(boardId, gridArray, isEnemy) {
            const board = document.getElementById(boardId);
            board.innerHTML = '';
            
            // Булангийн хоосон нүд
            board.appendChild(createCell(''));

            // Дээд талын Тоонууд (1-10)
            for (let i = 1; i <= SIZE; i++) board.appendChild(createCell(i, 'label'));

            for (let r = 0; r < SIZE; r++) {
                // Хажуугийн Үсгүүд (A-J)
                board.appendChild(createCell(LETTERS[r], 'label'));

                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell playable';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    
                    if (gridArray[r][c] === 1) {
                        const shipVisual = document.createElement('div');
                        shipVisual.className = 'ship';
                        cell.appendChild(shipVisual);
                    }

                    if (isEnemy) {
                        cell.onclick = () => playerFire(r, c, cell);
                    }
                    board.appendChild(cell);
                }
            }
        }

        function createCell(text, className = 'cell') {
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            return div;
        }

        function generateEmptyGrid() {
            return Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
        }

        // Хөлгүүдийг санамсаргүй, хооронд нь шүргэхгүйгээр байрлуулах
        function placeShips(grid) {
            SHIPS.forEach(len => {
                let placed = false;
                while (!placed) {
                    let isVert = Math.random() > 0.5;
                    let r = Math.floor(Math.random() * (isVert ? SIZE - len + 1 : SIZE));
                    let c = Math.floor(Math.random() * (isVert ? SIZE : SIZE - len + 1));

                    if (canPlace(grid, r, c, len, isVert)) {
                        for (let i = 0; i < len; i++) {
                            grid[r + (isVert ? i : 0)][c + (isVert ? 0 : i)] = 1;
                        }
                        placed = true;
                    }
                }
            });
        }

        function canPlace(grid, r, c, len, isVert) {
            for (let i = -1; i <= len; i++) {
                for (let j = -1; j <= 1; j++) {
                    let chkR = r + (isVert ? i : j);
                    let chkC = c + (isVert ? j : i);
                    if (chkR >= 0 && chkR < SIZE && chkC >= 0 && chkC < SIZE) {
                        if (grid[chkR][chkC] !== 0) return false;
                    }
                }
            }
            return true;
        }

        function playerFire(r, c, cell) {
            if (!playerTurn || gameOver || cell.classList.contains('hit') || cell.classList.contains('miss')) return;

            if (enemyGrid[r][c] === 1) {
                cell.classList.add('hit');
                checkWin(enemyGrid, 'enemy-board', 'PLAYER WINS! 🏆');
            } else {
                cell.classList.add('miss');
                playerTurn = false;
                document.getElementById('status-text').innerText = "Enemy's Turn...";
                setTimeout(enemyFire, 800);
            }
        }

        function enemyFire() {
            if (gameOver) return;
            let fired = false;
            while (!fired) {
                let r = Math.floor(Math.random() * SIZE);
                let c = Math.floor(Math.random() * SIZE);
                let boardEl = document.getElementById('player-board');
                // Нүдийг индексээр олох (11 баганатай тул +1 хийнэ)
                let index = (r + 1) * 11 + (c + 1); 
                let cell = boardEl.children[index];

                if (!cell.classList.contains('hit') && !cell.classList.contains('miss')) {
                    if (playerGrid[r][c] === 1) {
                        cell.classList.add('hit');
                        checkWin(playerGrid, 'player-board', 'ENEMY WINS! ☠️');
                        // Оносон бол дахиад буудна
                        if(!gameOver) setTimeout(enemyFire, 800); 
                    } else {
                        cell.classList.add('miss');
                        playerTurn = true;
                        document.getElementById('status-text').innerText = "Your Turn: Fire at Enemy Board!";
                    }
                    fired = true;
                }
            }
        }

        function checkWin(grid, boardId, msg) {
            const board = document.getElementById(boardId);
            const hits = board.querySelectorAll('.hit').length;
            const totalShipCells = SHIPS.reduce((a, b) => a + b, 0);
            
            if (hits === totalShipCells) {
                document.getElementById('status-text').innerText = msg;
                document.getElementById('status-text').style.color = "red";
                gameOver = true;
            }
        }

        function initGame() {
            playerGrid = generateEmptyGrid();
            enemyGrid = generateEmptyGrid();
            gameOver = false;
            playerTurn = true;
            document.getElementById('status-text').innerText = "Your Turn: Fire at Enemy Board!";
            document.getElementById('status-text').style.color = "var(--blue-pen)";

            placeShips(playerGrid);
            placeShips(enemyGrid);

            createBoard('player-board', playerGrid, false);
            createBoard('enemy-board', enemyGrid, true);
        }

        initGame();
    </script>
</body>
  </html>
