<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameHub Pro - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .profile-card { 
            background: var(--card-bg); width: 100%; max-width: 350px; 
            border-radius: 24px; padding: 20px; display: flex; 
            align-items: center; gap: 15px; margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            position: relative; box-sizing: border-box;
        }
        .avatar { width: 65px; height: 65px; border-radius: 50%; background: var(--accent-blue); border: 2px solid var(--accent-blue); object-fit: cover; }
        .user-info h2 { margin: 0; font-size: 18px; }
        .user-info p { margin: 2px 0 0; font-size: 12px; color: var(--text-dim); }
        
        .top-btns { position: absolute; right: 15px; top: 15px; display: flex; gap: 8px; }
        .icon-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 12px; cursor: pointer; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 15px; }
        .stat-box { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); padding: 15px; border-radius: 18px; text-align: center; cursor: pointer; }
        .stat-box small { display: block; color: var(--text-dim); font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        .stat-box b { font-size: 16px; color: var(--accent-blue); }

        .refer-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            width: 100%; max-width: 350px; border-radius: 20px; padding: 15px;
            margin-bottom: 20px; border: 1px dashed var(--accent-blue);
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
        }
        .refer-info h3 { margin: 0; font-size: 14px; color: var(--accent-blue); }
        .refer-info p { margin: 5px 0 0; font-size: 11px; color: var(--text-dim); }
        .invite-btn { background: var(--accent-blue); color: var(--bg-dark); border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }

        .menu-grid { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: var(--card-bg); padding: 18px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.97); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .input-group { width: 100%; max-width: 300px; margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
        .custom-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; box-sizing: border-box; }
        
        .upload-area { width: 100%; max-width: 300px; border: 2px dashed #334155; padding: 20px; border-radius: 15px; margin-bottom: 20px; cursor: pointer; box-sizing: border-box; }
        .save-btn { background: var(--accent-blue); color: var(--bg-dark); padding: 14px 40px; border-radius: 15px; font-weight: 700; border: none; cursor: pointer; width: 100%; max-width: 300px; }
        .bet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; width: 100%; max-width: 300px; }
        .bet-btn { background: var(--card-bg); border: 2px solid var(--accent-blue); color: white; padding: 15px 5px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://ui-avatars.com/api/?name=User" id="display-photo" class="avatar">
        <div class="user-info">
            <h2 id="display-name">Guest Player</h2>
            <p id="display-id">ID: 000000</p>
        </div>
        <div class="top-btns">
            <button class="icon-btn" onclick="openModal('settings-modal')">⚙️</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <small>Balance</small>
            <b id="balance-val">$100.000</b>
        </div>
        <div class="stat-box" onclick="openModal('wallet-modal')">
            <small>Wallet</small>
            <b id="wallet-status">TON Active</b>
        </div>
    </div>

    <div class="refer-card">
        <div class="refer-info">
            <h3>Invite Friend</h3>
            <p>Get +$0.001 for each invite</p>
        </div>
        <button class="invite-btn" onclick="inviteFriend()">Invite</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openBetModal('chess.html')"><span>♟️ Chess Pro</span><span>→</span></div>
        <div class="menu-item" onclick="openBetModal('checkers.html')"><span>🔴 Classic Checkers</span><span>→</span></div>
        <div class="menu-item" onclick="openBetModal('seabattle.html')"><span>⚓ Sea Battle 2</span><span>→</span></div>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="color:var(--accent-blue); margin-bottom:20px;">Settings</h2>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <p id="upload-text">📸 Upload Profile Photo</p>
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="previewImage(this)">
        </div>
        <div class="input-group">
            <label>Display Name</label>
            <input type="text" id="name-input" class="custom-input" placeholder="Enter your name...">
        </div>
        <button class="save-btn" onclick="saveSettings()">Save Changes</button>
        <button onclick="closeModal('settings-modal')" style="background:none; border:none; color:var(--text-dim); margin-top:20px; text-decoration:underline;">Cancel</button>
    </div>

    <div id="bet-modal" class="modal">
        <h2 style="color:var(--accent-blue);">Select Bet</h2>
        <div class="bet-grid">
            <button class="bet-btn" onclick="confirmBet(2)">$2</button>
            <button class="bet-btn" onclick="confirmBet(5)">$5</button>
            <button class="bet-btn" onclick="confirmBet(10)">$10</button>
        </div>
        <button onclick="closeModal('bet-modal')" style="color:var(--text-dim); background:none; border:none; text-decoration:underline;">Cancel</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let tempAvatar = "";
        let selectedGame = "";
        const REFERRAL_BONUS = 0.001;

        function init() {
            const user = tg.initDataUnsafe?.user;
            const name = localStorage.getItem('userName') || (user?.first_name || "Guest");
            const id = user?.id || "100001";
            const avatar = localStorage.getItem('userAvatar') || (user?.photo_url || "https://ui-avatars.com/api/?name=" + name);

            document.getElementById('display-name').innerText = name;
            document.getElementById('display-id').innerText = "ID: " + id;
            document.getElementById('display-photo').src = avatar;
            
            if (!localStorage.getItem('gameBalance')) localStorage.setItem('gameBalance', '100.000');
            updateBalanceUI();
        }

        function updateBalanceUI() {
            const currentBal = parseFloat(localStorage.getItem('gameBalance'));
            document.getElementById('balance-val').innerText = "$" + currentBal.toFixed(3);
        }

        function saveSettings() {
            const newName = document.getElementById('name-input').value;
            if(newName) localStorage.setItem('userName', newName);
            if (tempAvatar) localStorage.setItem('userAvatar', tempAvatar);
            location.reload(); 
        }

        function inviteFriend() {
            const link = "https://t.me/YourBotName?start=" + (tg.initDataUnsafe?.user?.id || "101");
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Play games with me!`);
            let bal = parseFloat(localStorage.getItem('gameBalance'));
            localStorage.setItem('gameBalance', (bal + REFERRAL_BONUS).toFixed(3));
            updateBalanceUI();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openBetModal(url) { selectedGame = url; openModal('bet-modal'); }

        function confirmBet(amount) {
            const bal = parseFloat(localStorage.getItem('gameBalance'));
            if (bal < amount) { alert("Insufficient balance!"); return; }
            localStorage.setItem('gameBalance', (bal - amount).toFixed(3));
            window.location.href = selectedGame;
        }

        init();
    </script>
</body>
</html>
